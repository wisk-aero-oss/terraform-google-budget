# https://terraform-docs.io/user-guide/configuration/

# Testing
# terraform-docs markdown . --recursive --output-file test.md

formatter: markdown
version: ">= 0.20"
footer-from: ""
header-from: main.tf
#output:
#  file: README.md
#  mode: inject
#  template: |-
#      <!-- BEGIN_AUTOMATED_TF_DOCS_BLOCK -->
#      {{ .Content }}
#      <!-- END_AUTOMATED_TF_DOCS_BLOCK -->
output-values:
  enabled: false
  from: ""
recursive:
  enabled: false
  path: modules
#  path: examples
sections:
  hide: []
  show: []
settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
sort:
  enabled: true
  by: name

content: |-
  {{ .Header }}

  ## Usage

  Basic usage of this module is as follows:

  ```hcl
  module "example" {
  {{"    " -}} source  = "wisk-aero-oss/budget/google"
  {{"    " -}} version = "~> 0.1"

  {{"    " -}} # Identify the Billing Account (Required - choose one)
  {{"    " -}} billing_account = "000000-000000-000000"
  {{"    " -}} # billing_name  = "My Billing Account"

  {{"    " -}} # Budget Amount (Required - choose one)
  {{"    " -}} amount = "1000"
  {{"    " -}} # use_last_period_amount = true

  {{- if .Module.RequiredInputs }}
    {{- $maxLen := 0 -}}
    {{- range .Module.RequiredInputs -}}
      {{- if gt (len .Name) $maxLen -}}
        {{- $maxLen = len .Name -}}
      {{- end -}}
    {{- end -}}
    {{"\n    " -}} # Required variables
    {{- range .Module.RequiredInputs }}
      {{ printf "%-*s" $maxLen .Name }} = {{ .GetValue }}
    {{- end }}
  {{- end }}
  }
  ```

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

  {{ .Footer }}
